aid: ftp
name: FTP
description: >-
  FTP (File Transfer Protocol) is a standard network protocol used to transfer
  files between a client and a server over a TCP-based network. FTP is a
  protocol specification rather than a vendor or HTTP API, and is documented
  primarily in IETF standards (RFC 959 and follow-ups) and in widely deployed
  server implementations such as vsftpd, ProFTPD, Pure-FTPd, and FileZilla
  Server. This index links to the canonical specifications and documentation
  for the protocol; no OpenAPI is generated because FTP is not an HTTP API.
